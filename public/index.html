<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
  <meta name="theme-color" content="#0b0d10">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>ScrewCounter · Apresentação (Viewer)</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #0b0d10;
      --surf: #13161b;
      --tx: #d8e0ed;
      --ac: #f5a623;
      --grn: #36d475;
      --red: #f04840;
      --font: 'Segoe UI', sans-serif;
      --mono: 'Courier New', monospace;
    }

    body {
      background: var(--bg);
      color: var(--tx);
      font-family: var(--font);
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
    }

    .container {
      width: 100%;
      max-width: 900px;
      text-align: center;
    }

    .title {
      font-size: 2rem;
      font-weight: bold;
      margin-bottom: 30px;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: var(--ac);
      text-shadow: 0 0 20px rgba(245, 166, 35, 0.3);
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
      margin-bottom: 30px;
    }

    .card {
      background: var(--surf);
      border: 2px solid rgba(245, 166, 35, 0.2);
      border-radius: 12px;
      padding: 25px;
      transition: all 0.3s ease;
    }

    .card:hover {
      border-color: var(--ac);
      box-shadow: 0 0 15px rgba(245, 166, 35, 0.15);
    }

    .card-label {
      font-size: 0.85rem;
      color: #7888a0;
      margin-bottom: 12px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .card-value {
      font-size: 3rem;
      font-weight: bold;
      color: var(--ac);
      font-family: var(--mono);
      text-shadow: 0 0 10px rgba(245, 166, 35, 0.3);
    }

    @keyframes pulse {
      0% { transform: scale(1.1); }
      100% { transform: scale(1); }
    }

    .card-value.pulse {
      animation: pulse 0.3s ease-out;
    }

    .status-bar {
      display: flex;
      gap: 15px;
      justify-content: center;
      margin-top: 30px;
      flex-wrap: wrap;
    }

    .status-item {
      display: flex;
      align-items: center;
      gap: 8px;
      background: var(--surf);
      padding: 12px 20px;
      border-radius: 8px;
      border: 1px solid rgba(245, 166, 35, 0.1);
      font-size: 0.95rem;
    }

    .status-dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: var(--red);
      animation: blink 1.5s ease-in-out infinite;
    }

    .status-dot.online {
      background: var(--grn);
      animation: glow 1.5s ease-in-out infinite;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    @keyframes glow {
      0%, 100% { 
        background: var(--grn);
        box-shadow: 0 0 8px var(--grn);
      }
      50% {
        background: var(--grn);
        box-shadow: 0 0 14px var(--grn);
      }
    }

    .motor-status {
      font-weight: bold;
      color: var(--grn);
    }

    .motor-status.off {
      color: var(--red);
    }

    .footer {
      margin-top: 40px;
      font-size: 0.85rem;
      color: #7888a0;
    }

    .connection-error {
      background: var(--red);
      color: white;
      padding: 15px;
      border-radius: 8px;
      margin-bottom: 20px;
      display: none;
    }

    .connection-error.show {
      display: block;
      animation: slideDown 0.3s ease;
    }

    @keyframes slideDown {
      from {
        opacity: 0;
        transform: translateY(-20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="title">📊 ScrewCounter · Apresentação</div>

    <div class="connection-error" id="errorMsg"></div>

    <div class="grid">
      <div class="card">
        <div class="card-label">Contador</div>
        <div class="card-value" id="counter">0</div>
      </div>

      <div class="card">
        <div class="card-label">Parafuso</div>
        <div class="card-value" id="screw">M6</div>
      </div>

      <div class="card">
        <div class="card-label">Peso</div>
        <div class="card-value" id="weight">0.0g</div>
      </div>
    </div>

    <div class="status-bar">
      <div class="status-item">
        <div class="status-dot" id="espDot"></div>
        <span>ESP32: <span id="espStatus">desconectado</span></span>
      </div>
      
      <div class="status-item">
        <div class="status-dot online"></div>
        <span>Viewer: <span id="viewerStatus">conectado</span></span>
      </div>
      
      <div class="status-item">
        <span>Motor: <span class="motor-status off" id="motorStatus">desligado</span></span>
      </div>
    </div>

    <div class="footer">
      Recebendo dados em tempo real via Railway Bridge
    </div>
  </div>

  <script>
    // ── URL do servidor ────────────────────────────────────
    var SERVER_WS_URL = (location.protocol==='https:'?'wss:':'ws:')+'//'+location.host;

    var ws = null;
    var lastData = {};

    // ── Conectar como Viewer ───────────────────────────────
    function connect(){
      try{
        ws = new WebSocket(SERVER_WS_URL);
        
        ws.onopen = function(){
          // Identifica como viewer (read-only)
          ws.send(JSON.stringify({type:'view'}));
          console.log('[VIEW] Conectado como viewer');
          document.getElementById('errorMsg').classList.remove('show');
        };
        
        ws.onmessage = function(e){
          try{
            var data = JSON.parse(e.data);
            updateUI(data);
          }catch(x){
            console.error('[VIEW] Erro ao parsear:', x);
          }
        };
        
        ws.onclose = function(){
          console.log('[VIEW] Desconectado');
          document.getElementById('espDot').classList.remove('online');
          document.getElementById('espStatus').textContent = 'desconectado';
          setTimeout(connect, 3000); // Reconecta a cada 3s
        };
        
        ws.onerror = function(err){
          console.error('[VIEW] Erro:', err);
          showError('Erro ao conectar no servidor');
        };
      }catch(err){
        showError('Falha ao conectar: ' + err.message);
        setTimeout(connect, 3000);
      }
    }

    // ── Atualizar UI com dados recebidos ───────────────────
    function updateUI(data){
      // Ignora confirmações do server
      if(data.bridge_status) return;
      
      // Status do ESP32
      if(data.esp_status){
        var dot = document.getElementById('espDot');
        var status = document.getElementById('espStatus');
        if(data.esp_status === 'online'){
          dot.classList.add('online');
          status.textContent = 'conectado';
        }else{
          dot.classList.remove('online');
          status.textContent = 'desconectado';
        }
        return;
      }
      
      // Dados do ESP32
      if(data.cnt !== undefined){
        lastData = data;
        var cnt = document.getElementById('counter');
        cnt.textContent = String(data.cnt || 0);
        cnt.classList.remove('pulse');
        void cnt.offsetWidth;
        cnt.classList.add('pulse');
        setTimeout(function(){cnt.classList.remove('pulse');}, 300);
      }
      
      if(data.sel){
        lastData.sel = data.sel;
      }
      
      if(data.motor !== undefined){
        lastData.motor = data.motor;
        updateMotor();
      }
      
      // Atualizar display
      if(lastData.cnt !== undefined){
        document.getElementById('counter').textContent = String(lastData.cnt);
      }
      if(lastData.sel){
        document.getElementById('screw').textContent = lastData.sel;
      }
      if(lastData.cnt && lastData.sel){
        var weights = {M3:0.07,M4:0.16,M6:0.55,M8:1.2};
        var w = ((lastData.cnt) * (weights[lastData.sel] || 0)).toFixed(1);
        document.getElementById('weight').textContent = w + 'g';
      }
    }

    function updateMotor(){
      var motorEl = document.getElementById('motorStatus');
      if(lastData.motor){
        motorEl.textContent = 'ligado';
        motorEl.classList.remove('off');
      }else{
        motorEl.textContent = 'desligado';
        motorEl.classList.add('off');
      }
    }

    function showError(msg){
      var err = document.getElementById('errorMsg');
      err.textContent = '⚠️ ' + msg;
      err.classList.add('show');
    }

    // ── Iniciar ────────────────────────────────────────────
    window.addEventListener('load', connect);
  </script>
</body>
</html>
